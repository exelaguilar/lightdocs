name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: dom, mbstring, pdo_sqlite, zip
          coverage: none

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y rsync shellcheck zip

      - name: Lint shell installers
        run: |
          shellcheck -x deploy/docker/entrypoint.sh deploy/docker/install.sh
          shellcheck -x deploy/native/install.sh deploy/native/lightdocs
          shellcheck -x deploy/proxmox/install-lxc.sh deploy/release/build.sh
          shellcheck -x tests/native-installer-env.sh tests/native-manager.sh tests/proxmox-installer.sh

      - name: Install and verify application
        run: |
          composer install --no-interaction --prefer-dist
          composer docs:validate
          composer docs:test
          bash tests/native-manager.sh
          bash tests/native-installer-env.sh
          bash tests/proxmox-installer.sh

      - name: Verify release version
        if: startsWith(github.ref, 'refs/tags/')
        run: test "${GITHUB_REF_NAME#v}" = "$(tr -d '[:space:]' < VERSION)"

      - name: Build release bundle
        run: bash deploy/release/build.sh

      - name: Upload GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || gh release create "${GITHUB_REF_NAME}" --generate-notes
          gh release upload "${GITHUB_REF_NAME}" dist/*.tar.gz dist/*.zip dist/*.sha256 --clobber

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker tags
        if: startsWith(github.ref, 'refs/tags/')
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and publish Docker image
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: LIGHTDOCS_VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
