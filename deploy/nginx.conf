# Replace wiki.host and /var/www/lightdocs with your real values.
server {
    listen 80;
    listen [::]:80;
    server_name wiki.host;

    root /var/www/lightdocs/upload;
    index index.php;

    charset utf-8;

    # Serve real assets directly. Send documentation URLs to index.php.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /index.php {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param DOCUMENT_ROOT $document_root;

        # Change this socket to match the installed PHP-FPM version.
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
    }

    # Only the two front controllers may execute.
    location = /admin/index.php {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/admin/index.php;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
    }

    location ~ \.php$ {
        return 404;
    }

    # Block dotfiles, including .env and .git.
    location ~ /\. {
        deny all;
    }

    # Cache immutable frontend assets without caching generated docs pages.
    location ~* \.(?:css|js|png|jpg|jpeg|gif|webp|ico|svg|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    client_max_body_size 8m;
}
