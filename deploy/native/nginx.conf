server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /opt/lightdocs/current/public;
    index index.php;
    charset utf-8;
    client_max_body_size 8m;

    location ^~ /uploads/ {
        alias /var/lib/lightdocs/public/uploads/;
        autoindex off;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /index.php {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /opt/lightdocs/current/public/index.php;
        fastcgi_param DOCUMENT_ROOT /opt/lightdocs/current/public;
        fastcgi_param HTTP_PROXY "";
        fastcgi_pass unix:/run/php/lightdocs.sock;
    }

    location ~ \.php$ { return 404; }
    location ~ /\. { deny all; }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|webp|ico|svg|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }
}
