[lightdocs]
user = www-data
group = www-data
listen = /run/php/lightdocs.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = dynamic
pm.max_children = 8
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.max_requests = 500

clear_env = yes
env[LIGHTDOCS_SITE_DIR] = /var/lib/lightdocs
env[LIGHTDOCS_STATE_DIR] = /var/lib/lightdocs/var
env[LIGHTDOCS_ENV_FILE] = /etc/lightdocs/lightdocs.env

php_admin_value[upload_max_filesize] = 8M
php_admin_value[post_max_size] = 10M
php_admin_value[session.cookie_httponly] = 1
