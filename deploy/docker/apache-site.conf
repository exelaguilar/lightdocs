<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html/upload
    DirectoryIndex index.php

    <Directory /var/www/html/upload>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
        FallbackResource /index.php
    </Directory>

    Alias /uploads/ /var/lib/lightdocs/storage/uploads/
    <Directory /var/lib/lightdocs/storage/uploads>
        Options -Indexes
        AllowOverride None
        Require all granted
        <FilesMatch "\.php$">
            Require all denied
        </FilesMatch>
    </Directory>

    SetEnvIf X-Forwarded-Proto https HTTPS=on

    ErrorLog ${APACHE_LOG_DIR}/lightdocs-error.log
    CustomLog ${APACHE_LOG_DIR}/lightdocs-access.log combined
</VirtualHost>
